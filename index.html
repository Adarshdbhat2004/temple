<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ದೇವಸ್ಥಾನ ಪೂಜೆ ಬುಕ್ಕಿಂಗ್</title>

<style>
:root {
    --primary: #FF7A00;
    --primary-hover: #E66E00;
    --primary-light: #FFF5EC;
    --primary-border: #FFE2CC;
    --dark: #2D3142;
    --gray: #6C757D;
    --light-gray: #F8F9FA;
    --radius-lg: 24px;
    --radius-md: 14px;
}

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Noto Sans Kannada", sans-serif;
    -webkit-tap-highlight-color: transparent;
}

body{
    background: #F4F6F9;
    color: var(--dark);
    padding: 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* MAIN CARD */
.temple-card{
    width: 100%;
    max-width: 400px;
    background: white;
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(255, 122, 0, 0.06), 0 5px 15px rgba(0, 0, 0, 0.03);
    border: 1px solid rgba(0, 0, 0, 0.02);
}

.temple-img-wrapper {
    position: relative;
    width: 100%;
    height: 220px;
}

.temple-img{
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card-content{
    padding: 24px;
    text-align: center;
}

.temple-name{
    font-size: 24px;
    color: var(--primary);
    font-weight: 700;
    line-height: 1.3;
}

.address{
    color: var(--gray);
    margin-top: 8px;
    font-size: 15px;
    line-height: 1.5;
}

.open-btn{
    width: 100%;
    padding: 16px;
    border: none;
    background: var(--primary);
    color: white;
    border-radius: var(--radius-md);
    margin-top: 20px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(255, 122, 0, 0.2);
}

/* FIXED POPUP FOR MOBILE */
.popup{
    width: 100%;
    height: 100%;
    position: fixed;
    top: 0;
    left: 0;
    background: rgba(45, 49, 66, 0.6);
    backdrop-filter: blur(4px);
    display: none;
    justify-content: center;
    align-items: flex-end; 
    z-index: 2000;
}

@media(min-width: 576px) {
    .popup {
        align-items: center; 
        padding: 20px;
    }
}

.popup-content{
    background: white;
    width: 100%;
    max-width: 460px;
    border-top-left-radius: var(--radius-lg);
    border-top-right-radius: var(--radius-lg);
    display: flex;
    flex-direction: column;
    max-height: 90vh; /* Keeps it strictly inside viewport */
    box-shadow: 0 -10px 35px rgba(0,0,0,0.15);
    animation: slideUp 0.25s ease-out;
}

@media(min-width: 576px) {
    .popup-content {
        border-radius: var(--radius-lg);
        max-height: 85vh;
    }
}

@keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
}

.popup-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 20px;
    border-bottom: 1px solid #EAEAEA;
}

.popup-title{
    color: var(--primary);
    font-size: 20px;
    font-weight: 700;
}

.close-x-btn {
    background: var(--light-gray);
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 16px;
    color: var(--dark);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* SCROLLABLE SCENE BODY */
.popup-body {
    padding: 10px 20px;
    overflow-y: auto;
    flex: 1;
    -webkit-overflow-scrolling: touch;
}

/* CRITICAL FIX: FIXED STICKY FOOTER ZONE */
.popup-footer {
    padding: 12px 20px calc(12px + env(safe-area-inset-bottom, 16px)) 20px;
    background: white;
    border-top: 1px solid #EAEAEA;
    box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.03);
}

/* CONTAINER FIELDS Styling */
label{
    font-weight: 600;
    display: block;
    margin-top: 14px;
    margin-bottom: 6px;
    font-size: 14px;
    color: var(--dark);
}

input, select{
    width: 100%;
    padding: 12px 14px;
    border-radius: var(--radius-md);
    border: 1.5px solid #CBD5E1;
    font-size: 15px;
    background-color: white;
    color: var(--dark);
    outline: none;
    transition: all 0.2s ease;
    -webkit-appearance: none; /* Uniform styling across iOS/Android */
}

input:focus, select:focus{
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.12);
}

/* PERSON CARDS */
.person{
    border: 1px solid #E2E8F0;
    padding: 16px;
    border-radius: var(--radius-md);
    margin-top: 14px;
    background: var(--light-gray);
}

.person-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    color: var(--gray);
    font-size: 13px;
    border-bottom: 1px dashed #E2E8F0;
    padding-bottom: 8px;
    margin-bottom: 4px;
}

.remove-btn {
    background: transparent;
    color: #DC3545;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
}

.add-btn{
    width: 100%;
    padding: 14px;
    margin-top: 16px;
    margin-bottom: 24px;
    background: white;
    color: var(--primary);
    border: 2px dashed var(--primary-border);
    border-radius: var(--radius-md);
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
}

/* IMMOVABLE WHATSAPP BUTTON */
.submit-btn{
    width: 100%;
    padding: 15px;
    background: #25D366; 
    color: white;
    border: none;
    border-radius: var(--radius-md);
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(37, 211, 102, 0.3);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
}

.submit-btn:active {
    background: #1EBE52;
    transform: scale(0.99);
}

.optional{
    color: var(--gray);
    font-size: 12px;
    font-weight: normal;
    margin-left: 4px;
}
</style>
</head>

<body>

<!-- TEMPLE CARD -->
<div class="temple-card">
    <div class="temple-img-wrapper">
        <img src="shiva.jpeg" class="temple-img" alt="Temple">
    </div>
    <div class="card-content">
        <div class="temple-name">ತ್ರಿಪುರಾಂತಕೇಶ್ವರ ದೇವಸ್ಥಾನ</div>
        <div class="address">
            ಸಿರುವಂತೆ, ಸಾಗರ <br>
            ಕರ್ನಾಟಕ - 577401
        </div>
        <button class="open-btn" onclick="openPopup()">
            ಪೂಜೆ ಆಯ್ಕೆ ಮಾಡಿ
        </button>
    </div>
</div>

<!-- POPUP MODAL -->
<div class="popup" id="popup">
    <div class="popup-content">
        <div class="popup-header">
            <div class="popup-title">ವಿವರಗಳನ್ನು ಭರ್ತಿ ಮಾಡಿ</div>
            <button class="close-x-btn" onclick="closePopup()">✕</button>
        </div>

        <!-- SCROLLABLE CONTENT BODY -->
        <div class="popup-body">
            <!-- POOJA SELECTION -->
            <label for="pooja">ಪೂಜೆ ಆಯ್ಕೆ ಮಾಡಿ</label>
            <select id="pooja">
                <option value="ಕುಂಕುಮ ಅರ್ಚನೆ - ₹150">ಕುಂಕುಮ ಅರ್ಚನೆ - ₹150</option>
                <option value="ರುದ್ರಾಭಿಷೇಕ - ₹500">ರುದ್ರಾಭಿಷೇಕ - ₹500</option>
                <option value="ಪಂಚಾಮೃತ ಅಭಿಷೇಕ - ₹350">ಪಂಚಾಮೃತ ಅಭಿಷೇಕ - ₹350</option>
                <option value="ಏಕಾದಶಿ ರುದ್ರ - ₹1500">ಏಕಾದಶಿ ರುದ್ರ - ₹1500</option>
                <option value="ಮಹಾಪೂಜೆ - ₹1000">ಮಹಾಪೂಜೆ - ₹1000</option>
            </select>

            <!-- DATE SELECTION -->
            <label for="poojaDate">ಪೂಜೆ ದಿನಾಂಕ ಆಯ್ಕೆ ಮಾಡಿ</label>
            <input type="date" id="poojaDate" required>

            <!-- PERSON LIST CONTAINER -->
            <div id="personContainer">
                <div class="person" id="personBlock_1">
                    <div class="person-header">
                        <span>ವ್ಯಕ್ತಿ 1</span>
                    </div>
                    
                    <label>ಹೆಸರು</label>
                    <input type="text" class="name" placeholder="ಭಕ್ತಿಯ ಹೆಸರು ನಮೂದಿಸಿ" required>

                    <label>ರಾಶಿ <span class="optional">(ಐಚ್ಛಿಕ/optional)</span></label>
                    <select class="rashi">
                        <option value="ತಿಳಿಸಿಲ್ಲ">ಆಯ್ಕೆ ಮಾಡಿ</option>
                        <option>ಮೇಷ</option>
                        <option>ವೃಷಭ</option>
                        <option>ಮಿಥುನ</option>
                        <option>ಕಟಕ</option>
                        <option>ಸಿಂಹ</option>
                        <option>ಕನ್ಯಾ</option>
                        <option>ತುಲಾ</option>
                        <option>ವೃಶ್ಚಿಕ</option>
                        <option>ಧನು</option>
                        <option>ಮಕರ</option>
                        <option>ಕುಂಭ</option>
                        <option>ಮೀನ</option>
                    </select>

                    <label>ನಕ್ಷತ್ರ <span class="optional">(ಐಚ್ಛಿಕ/optional)</span></label>
                    <select class="nakshatra">
                        <option value="ತಿಳಿಸಿಲ್ಲ">ಆಯ್ಕೆ ಮಾಡಿ</option>
                        <option>ಅಶ್ವಿನಿ</option>
                        <option>ಭರಣಿ</option>
                        <option>ಕೃತಿಕಾ</option>
                        <option>ರೋಹಿಣಿ</option>
                        <option>ಮೃಗಶಿರ</option>
                        <option>ಆರ್ದ್ರ</option>
                        <option>ಪುನರ್ವಸು</option>
                        <option>ಪುಷ್ಯ</option>
                        <option>ಮಘಾ</option>
                        <option>ಹಸ್ತ</option>
                        <option>ಸ್ವಾತಿ</option>
                        <option>ಅನುರಾಧಾ</option>
                    </select>
                </div>
            </div>

            <!-- ADD BUTTON -->
            <button class="add-btn" onclick="addPerson()">
                + ಇನ್ನೊಬ್ಬರ ಹೆಸರು ಸೇರಿಸಿ
            </button>
        </div>

        <!-- ALWAYS VISIBLE FIXED FOOTER FOR WHATSAPP BUTTON -->
        <div class="popup-footer">
            <button class="submit-btn" onclick="sendWhatsApp()">
                <svg style="width:20px;height:20px;fill:currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.513 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.713-1.455L0 24zm6.59-4.846c1.6.95 3.488 1.449 5.413 1.451 5.428 0 9.845-4.414 9.848-9.842.002-2.63-1.023-5.101-2.884-6.964C17.16 1.936 14.685 1.1 12.006 1.1c-5.432 0-9.851 4.415-9.854 9.845-.001 1.922.501 3.799 1.458 5.404L2.662 21.3l5.004-1.314-.019-.032zM17.44 14.93c-.3-.149-1.77-.874-2.043-.974-.274-.1-.474-.149-.674.149-.2.3-.773.974-.948 1.174-.175.2-.35.225-.65.075-1.02-.513-1.861-.944-2.585-1.57-.611-.528-1.018-1.18-1.138-1.381-.12-.2-.013-.308.087-.407.091-.089.2-.23.3-.346.1-.115.133-.198.2-.329.066-.134.034-.251-.017-.35-.05-.1-.474-1.144-.65-1.564-.171-.414-.343-.358-.474-.364-.121-.005-.26-.006-.4-.006s-.369.052-.562.26c-.193.207-.738.722-.738 1.761s.756 2.04 1.861 2.522c1.105.482 1.919 1.816 3.411 2.46.36.155.721.215 1.058.118.375-.108 1.77-.724 2.02-1.417.249-.693.249-1.288.174-1.415-.074-.124-.273-.223-.573-.372z"/></svg>
                       ಕಳುಹಿಸಿ
            </button>
        </div>
    </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
    const today = new Date();
    const tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);
    document.getElementById('poojaDate').value = tomorrow.toISOString().split('T')[0];
    document.getElementById('poojaDate').min = today.toISOString().split('T')[0];
});

function openPopup(){
    document.getElementById("popup").style.display = "flex";
    document.body.style.overflow = "hidden"; 
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
    document.body.style.overflow = "auto";
}

let personCount = 1;

function addPerson(){
    personCount++;
    let container = document.getElementById("personContainer");
    let div = document.createElement("div");
    div.classList.add("person");
    div.id = `personBlock_${personCount}`;

    div.innerHTML = `
        <div class="person-header">
            <span>ವ್ಯಕ್ತಿ ${personCount}</span>
            <button class="remove-btn" onclick="removePerson(${personCount})">ತೆಗೆದುಹಾಕಿ</button>
        </div>
        
        <label>ಹೆಸರು</label>
        <input type="text" class="name" placeholder="ಭಕ್ತಿಯ ಹೆಸರು ನಮೂದಿಸಿ" required>

        <label>ರಾಶಿ <span class="optional">(ಐಚ್ಛಿಕ/optional)</span></label>
        <select class="rashi">
            <option value="ತಿಳಿಸಿಲ್ಲ">ಆಯ್ಕೆ ಮಾಡಿ</option>
            <option>ಮೇಷ</option>
            <option>ವೃಷಭ</option>
            <option>ಮಿಥುನ</option>
            <option>ಕಟಕ</option>
            <option>ಸಿಂಹ</option>
            <option>ಕನ್ಯಾ</option>
            <option>ತುಲಾ</option>
            <option>ವೃಶ್ಚಿಕ</option>
            <option>ಧನು</option>
            <option>ಮಕರ</option>
            <option>ಕುಂಭ</option>
            <option>ಮೀನ</option>
        </select>

        <label>ನಕ್ಷತ್ರ <span class="optional">(ಐಚ್ಛಿಕ)</span></label>
        <select class="nakshatra">
            <option value="ತಿಳಿಸಿಲ್ಲ">ಆಯ್ಕೆ ಮಾಡಿ</option>
            <option>ಅಶ್ವಿನಿ</option>
            <option>ಭರಣಿ</option>
            <option>ಕೃತಿಕಾ</option>
            <option>ರೋಹಿಣಿ</option>
            <option>ಮೃಗಶಿರ</option>
            <option>ಆರ್ದ್ರ</option>
            <option>ಪುನರ್ವಸು</option>
            <option>ಪುಷ್ಯ</option>
            <option>ಮಘಾ</option>
            <option>ಹಸ್ತ</option>
            <option>ಸ್ವಾತಿ</option>
            <option>ಅನುರಾಧಾ</option>
        </select>
    `;
    container.appendChild(div);
    
    // Smooth scroll down to the new block added
    setTimeout(() => {
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
}

function removePerson(id) {
    const element = document.getElementById(`personBlock_${id}`);
    if(element) {
        element.remove();
        reindexPersons();
    }
}

function reindexPersons() {
    const blocks = document.querySelectorAll('#personContainer .person');
    personCount = 0;
    blocks.forEach((block, index) => {
        personCount = index + 1;
        block.id = `personBlock_${personCount}`;
        const headerSpan = block.querySelector('.person-header span');
        if(headerSpan) headerSpan.textContent = `ವ್ಯಕ್ತಿ ${personCount}`;
        
        const removeBtn = block.querySelector('.remove-btn');
        if(removeBtn) {
            removeBtn.setAttribute('onclick', `removePerson(${personCount})`);
        }
    });
}

function sendWhatsApp(){
    let pooja = document.getElementById("pooja").value;
    let rawDate = document.getElementById("poojaDate").value;
    
    let formattedDate = rawDate;
    if(rawDate) {
        const d = new Date(rawDate);
        formattedDate = `${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()}`;
    }

    let names = document.querySelectorAll(".name");
    let rashi = document.querySelectorAll(".rashi");
    let nakshatra = document.querySelectorAll(".nakshatra");

    if(!names[0] || names[0].value.trim() === "") {
        alert("ದಯವಿಟ್ಟು ಮೊದಲ ವ್ಯಕ್ತಿಯ ಹೆಸರನ್ನು ನಮೂದಿಸಿ.");
        return;
    }
    if(!rawDate) {
        alert("ದಯವಿಟ್ಟು ಪೂಜೆಯ ದಿನಾಂಕವನ್ನು ಆಯ್ಕೆ ಮಾಡಿ.");
        return;
    }

    let message = "🙏 *ತ್ರಿಪುರಾಂತಕೇಶ್ವರ ದೇವಸ್ಥಾನ ಪೂಜೆ* %0A%0A";
    message += "📿 *ಪೂಜೆ:* " + encodeURIComponent(pooja) + "%0A";
    message += "📅 *ದಿನಾಂಕ:* " + encodeURIComponent(formattedDate) + "%0A%0A";

    for(let i=0; i<names.length; i++){
        let pName = names[i].value.trim();
        if(!pName) continue; // Skip empty blocks if any accidentally happen

        let pRashi = rashi[i].value;
        let pNakshatra = nakshatra[i].value;

        message += "👤 *ವ್ಯಕ್ತಿ " + (i+1) + "*%0A";
        message += "ಹೆಸರು: " + encodeURIComponent(pName) + "%0A";
        message += "ರಾಶಿ: " + encodeURIComponent(pRashi) + "%0A";
        message += "ನಕ್ಷತ್ರ: " + encodeURIComponent(pNakshatra) + "%0A%0A";
    }

    let phone = "9449954770";
    let url = "https://wa.me/91" + phone + "?text=" + message;
    window.open(url, "_blank");
}
</script>

</body>
</html>
